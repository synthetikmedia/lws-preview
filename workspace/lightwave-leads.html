<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightwave Solar — Tesla Leads ROI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0f1e;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .slide {
    width: 100%;
    max-width: 620px;
  }

  .title {
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f59e0b;
    margin-bottom: 8px;
  }

  .tagline {
    text-align: center;
    font-size: 17px;
    color: #475569;
    margin-bottom: 48px;
  }

  .col-headers {
    display: grid;
    grid-template-columns: 1fr 160px 160px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1f2937;
    margin-bottom: 2px;
  }

  .col-headers span {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #374151;
    text-align: center;
  }

  .col-headers span:first-child { text-align: left; }

  .row {
    display: grid;
    grid-template-columns: 1fr 160px 160px;
    align-items: baseline;
    padding: 22px 0;
    border-bottom: 1px solid #1f2937;
  }

  .row .label { font-size: 20px; color: #94a3b8; }

  .row .deals {
    font-size: 19px;
    font-weight: 500;
    text-align: center;
    color: #475569;
  }

  .row .revenue {
    font-size: 30px;
    font-weight: 700;
    text-align: center;
  }

  .row.before .revenue { color: #94a3b8; }
  .row.after .revenue { color: #f59e0b; }

  .total {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 28px 0 0;
  }

  .total .label {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #475569;
  }

  .total .amount {
    font-size: 56px;
    font-weight: 900;
    color: #f59e0b;
    line-height: 1;
  }

  .total .amount span {
    font-size: 16px;
    font-weight: 500;
    color: #475569;
  }

  .footer {
    text-align: center;
    margin-top: 56px;
    font-size: 11px;
    color: #1f2937;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="title">⚡ Tesla Leads — Auto-Text</div>
  <div class="tagline">100 leads / month · $70,000 avg deal · immediate AI follow-up on missed calls</div>

  <div class="col-headers">
    <span></span>
    <span>Deals Closed / mo</span>
    <span>Revenue / yr</span>
  </div>

  <div class="row before">
    <span class="label">Before (1% close rate)</span>
    <span class="deals">1 deal</span>
    <span class="revenue">$840,000</span>
  </div>
  <div class="row after">
    <span class="label">After TextBack (4% close rate)</span>
    <span class="deals">4 deals</span>
    <span class="revenue">$3,360,000</span>
  </div>

  <div class="total">
    <div class="label">Additional revenue unlocked</div>
    <div class="amount">$2,520,000 <span>/ yr</span></div>
  </div>

  <div class="footer">FOUNTAINHEAD LLC</div>

</div>
</body>
</html>
